<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giorgi Siradze</title>
    <meta name="description" content="Giorgi Siradze" />
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-2DY7J6RWHF"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-2DY7J6RWHF');
    </script>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              matrix: {
                dark: '#0a0e0a',
                green: '#00FF41',
                light: '#7FFF00',
                cyan: '#03A062',
                red: '#c41e3a',
                blue: '#0078d7',
              },
            },
            fontFamily: {
              matrix: ['Courier New', 'Courier', 'monospace'],
            },
            animation: {
              'fade-in': 'fade-in 1s ease-out',
              float: 'float 6s ease-in-out infinite',
              'matrix-rain': 'matrix-rain 10s linear infinite',
            },
            keyframes: {
              'matrix-rain': {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(1000%)' },
              },
              'fade-in': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #0a0e0a;
        color: #00ff41;
        font-family: 'Courier New', Courier, monospace;
        margin: 0;
        overflow: hidden;
      }
      .pill-shadow-red {
        filter: drop-shadow(0 0 10px rgba(196, 30, 58, 0.8));
      }
      .pill-shadow-blue {
        filter: drop-shadow(0 0 10px rgba(0, 120, 215, 0.8));
      }
      @keyframes matrix-character-change {
        0%,
        100% {
          content: '0';
        }
        10% {
          content: '1';
        }
        20% {
          content: 'イ';
        }
        30% {
          content: 'ま';
        }
        40% {
          content: 'ン';
        }
        50% {
          content: 'サ';
        }
        60% {
          content: 'リ';
        }
        70% {
          content: 'ス';
        }
        80% {
          content: '∞';
        }
        90% {
          content: '7';
        }
      }
      .matrix-character::before {
        content: '1';
        animation: matrix-character-change 5s infinite;
      }
    </style>
  </head>
  <body>
    <div
      id="matrix-entry"
      class="relative w-full h-screen flex items-center justify-center overflow-hidden"
    >
      <!-- Matrix Digital Rain -->
      <canvas
        id="matrix-rain"
        class="absolute top-0 left-0 w-full h-full"
      ></canvas>
      <!-- Overlay Gradient -->
      <div
        class="absolute inset-0 bg-gradient-to-b from-matrix-dark/70 via-matrix-dark/30 to-matrix-dark/70 z-[1]"
      ></div>
      <!-- Content -->
      <div
        class="relative z-10 flex flex-col items-center justify-center gap-8 p-4 text-center animate-fade-in"
      >
        <h1
          class="text-4xl md:text-6xl font-bold mb-2 tracking-tighter text-matrix-green"
        >
          THE MATRIX OF MISDIRECTION
        </h1>
        <p class="text-xl md:text-2xl max-w-2xl mb-6 text-matrix-light">
          This is your last chance. After this, there is no turning back.
        </p>
        <div class="flex flex-col md:flex-row gap-8 items-center mb-8">
          <div class="flex flex-col items-center">
            <div
              id="blue-pill"
              class="relative cursor-pointer transition-all duration-500 transform hover:scale-110 hover:rotate-[-5deg] w-16 h-40 rounded-full flex items-center justify-center bg-matrix-blue pill-shadow-blue"
            >
              <div
                class="absolute w-full h-full rounded-full bg-white/10 backdrop-blur-sm"
              ></div>
              <div class="w-14 h-20 rounded-full bg-matrix-blue"></div>
            </div>
            <p class="mt-4 text-lg text-matrix-cyan">Blue Pill</p>
            <p class="text-sm opacity-70 max-w-xs">
              The story ends, you wake up and believe whatever you want to
              believe.
            </p>
          </div>
          <div class="my-4 text-xl font-bold">OR</div>
          <div class="flex flex-col items-center animate-float">
            <div
              id="red-pill"
              class="relative cursor-pointer transition-all duration-500 transform hover:scale-110 hover:rotate-[-5deg] w-16 h-40 rounded-full flex items-center justify-center bg-matrix-red pill-shadow-red"
            >
              <div
                class="absolute w-full h-full rounded-full bg-white/10 backdrop-blur-sm"
              ></div>
              <div class="w-14 h-20 rounded-full bg-matrix-red"></div>
            </div>
            <p class="mt-4 text-lg text-matrix-red">Red Pill</p>
            <p class="text-sm opacity-70 max-w-xs">
              Stay in Wonderland, and I show you how deep the rabbit hole goes.
            </p>
          </div>
        </div>
      </div>
    </div>
    <audio id="rickroll-audio" src="rickroll.mp3" loop hidden></audio>
    <script>
      // Matrix Digital Rain effect
      const canvas = document.getElementById('matrix-rain');
      const ctx = canvas.getContext('2d');
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      const matrix =
        'ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%イウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヰヱヲ';
      const characters = matrix.split('');
      const fontSize = 14;
      let columns = Math.floor(canvas.width / fontSize);
      let drops = [];
      function initDrops() {
        columns = Math.floor(canvas.width / fontSize);
        drops = [];
        for (let i = 0; i < columns; i++) {
          drops[i] = Math.floor((Math.random() * canvas.height) / fontSize);
        }
      }
      initDrops();
      window.addEventListener('resize', initDrops);
      function drawMatrixRain() {
        ctx.fillStyle = 'rgba(10, 14, 10, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00FF41';
        ctx.font = `${fontSize}px monospace`;
        for (let i = 0; i < drops.length; i++) {
          const text =
            characters[Math.floor(Math.random() * characters.length)];
          ctx.fillText(text, i * fontSize, drops[i] * fontSize);
          if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i]++;
        }
      }
      setInterval(drawMatrixRain, 35);
      // Rickroll logic after pill click
      function showRickroll() {
        // Remove entry overlay
        document.getElementById('matrix-entry').style.display = 'none';
        // Set GIF background
        document.body.style.background =
          'url(https://media.giphy.com/media/Ju7l5y9osyymQ/giphy.gif) no-repeat center center fixed';
        document.body.style.backgroundSize = 'cover';
        // Play music
        var audio = document.getElementById('rickroll-audio');
        audio.play();
      }
      document
        .getElementById('red-pill')
        .addEventListener('click', showRickroll);
      document
        .getElementById('blue-pill')
        .addEventListener('click', showRickroll);
    </script>
  </body>
</html>
